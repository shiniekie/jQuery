<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Math in jQuery</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="jQuery.css">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
</head>
<body>

<div class="d-flex justify-content-center align-items-center vh-100 p-3">

    <div class="calculator-card p-4 shadow w-100" style="max-width: 600px;">

        <h1 class="mb-4 text-center">Math in jQuery</h1>

        <!-- Use row for inputs and responsive flex -->
        <div class="row g-3 align-items-start">

            <!-- First Number + Solve Button (large screens) -->
            <div class="col-12 col-md-4 d-flex flex-column">
                <label class="form-label">First Number:</label>
                <input type="number" id="firstNumber" class="form-control custom-input mt-1">

                <!-- Solve button for medium+ screens -->
                <button id="solveBtn" class="btn solve-btn mt-3 w-100 d-none d-md-block">Solve</button>
            </div>

            <!-- Operator -->
            <div class="col-12 col-md-4">
                <label class="form-label">Operator:</label>
                <select id="operator" class="form-select custom-operator mt-1">
                    <option value="+">+</option>
                    <option value="-">-</option>
                    <option value="*">*</option>
                    <option value="/">/</option>
                </select>
            </div>

            <!-- Second Number -->
            <div class="col-12 col-md-4">
                <label class="form-label">Second Number:</label>
                <input type="number" id="secondNumber" class="form-control custom-input mt-1">
            </div>

        </div>

        <!-- Solve button for small screens -->
        <div class="mt-4 text-center d-block d-md-none">
            <button id="solveBtnSmall" class="btn solve-btn w-50">Solve</button>
        </div>

        <!-- Result -->
        <div class="mt-3 text-left">
            <h4 id="result"></h4>
        </div>

    </div>

</div>

<script src="jQuery.js"></script>
</body>
</html>
