<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Math in jQuery</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="jQuery.css">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
</head>
<body>

<div class="d-flex justify-content-center align-items-center vh-100">
    
    <div class="calculator-card p-5 shadow">

        <h1 class="mb-5">Math in jQuery</h1>

        <div class="d-flex gap-5 align-items-start">

            <!-- First Number -->
            <div class="first-section">
                <label class="form-label">First Number:</label>
                <input type="number" id="firstNumber" class="form-control custom-input">

                <!-- Solve Button -->
                <button id="solveBtn" class="btn solve-btn mt-4">Solve</button>
            </div>

            <!-- Operator -->
            <div>
                <label class="form-label">Operator</label>
                <select id="operator" class="form-select custom-operator">
                    <option value="+">+</option>
                    <option value="-">-</option>
                    <option value="*">*</option>
                    <option value="/">/</option>
                </select>
            </div>

            <!-- Second Number -->
            <div>
                <label class="form-label">Second Number:</label>
                <input type="number" id="secondNumber" class="form-control custom-input">
            </div>

        </div>

        <div class="mt-5">
            <h4 id="result"></h4>
        </div>

    </div>

</div>

<script>
$(document).ready(function() {

    $("#solveBtn").click(function() {

        let first = $("#firstNumber").val();
        let second = $("#secondNumber").val();
        let operator = $("#operator").val();
        let $result = $("#result");

        if (first === "" || second === "") {
            $result.text("");
            return;
        }

        first = parseFloat(first);
        second = parseFloat(second);

        let result;

        switch(operator) {
            case "+": result = first + second; break;
            case "-": result = first - second; break;
            case "*": result = first * second; break;
            case "/":
                result = (second == 0) ? "Cannot divide by zero" : first / second;
                break;
        }

        $result.text("Result: " + result);

    });

});
</script>

</body>
</html>
